# Seed configuration — loaded into SQLite on first boot (or after deleting the DB).
# After first boot the live config is edited via the admin GUI, not this file.

rotation:
  interval_seconds: 25
  order: [markets, sports, news]   # weather also has a stage page — add it here to rotate it

modules:
  markets:
    enabled: true
    poll_seconds: 60
    symbols: [SPY, QQQ, AAPL, MSFT, NVDA, TSLA, BTC-USD]

  sports:
    enabled: true
    auto_feature: false   # jump to sports + pin while a followed game is live
    celebrations: true    # full-screen alert when a followed team scores
    live_mode: true       # sports page becomes a game tracker while a followed game is live
    poll_seconds_live: 30
    poll_seconds_idle: 600
    leagues:
      - { sport: baseball, league: mlb }
      - { sport: football, league: nfl }
      - { sport: hockey, league: nhl }
    followed_teams: [Rays, Buccaneers, Lightning]

  news:
    enabled: true
    poll_seconds: 300
    keep: 30
    feeds:
      - { name: BBC World, url: "https://feeds.bbci.co.uk/news/world/rss.xml" }
      - { name: NPR, url: "https://feeds.npr.org/1001/rss.xml" }
      - { name: Ars Technica, url: "https://feeds.arstechnica.com/arstechnica/index" }
      - { name: Hacker News, url: "https://hnrss.org/frontpage" }

  weather:
    enabled: true
    poll_seconds: 900
    location_name: "Clearwater, FL"
    latitude: 27.9659
    longitude: -82.8001

  weather_alerts:        # NWS active alerts at the weather module's location
    enabled: true
    overlay: true        # full-screen takeover for Extreme/Severe warnings
    poll_seconds: 180

  # Stretch modules — flip enabled and add to rotation.order to use.
  # proxmox and adsb also need their env vars in .env (see .env.example).
  proxmox:
    enabled: false
    poll_seconds: 60

  adsb:
    enabled: false
    poll_seconds: 15
    radius_km: 40

  astro:
    enabled: false
    poll_seconds: 1800

appearance:
  theme: midnight     # midnight | daylight | amber | frost
  layout: rail-left   # rail-left | rail-right | full-stage | banner | focus | split | mosaic | zen

night:
  dim_at: "23:00"
  wake_at: "07:00"
  dim_level: 10
  day_level: 100
  method: ddc        # ddc → ddcutil; falls back to a software dim overlay
  nightly_reload_at: "04:00"

ha:
  scenes: []        # up to 4 scene entity_ids
  lights: []        # up to 8 light entity_ids
  climate: null     # one climate entity_id
  media: null       # one media_player entity_id
  alerts: []        # [{entity, state, text?}] → alert-colored tape items while matched
