# Seed configuration — loaded into SQLite on first boot (or after deleting the DB).
# After first boot the live config is edited via the admin GUI, not this file.

rotation:
  interval_seconds: 25
  order: [markets, sports, news]   # weather also has a stage page — add it here to rotate it

modules:
  markets:
    enabled: true
    poll_seconds: 60
    symbols: [SPY, QQQ, AAPL, MSFT, NVDA, TSLA, BTC-USD]

  sports:
    enabled: true
    auto_feature: false   # jump to sports + pin while a followed game is live
    celebrations: true    # full-screen alert when a followed team scores
    live_mode: true       # sports page becomes a game tracker while a followed game is live
    poll_seconds_live: 30
    poll_seconds_idle: 600
    leagues:
      - { sport: baseball, league: mlb }
      - { sport: football, league: nfl }
      - { sport: hockey, league: nhl }
    followed_teams: [Rays, Buccaneers, Lightning]

  news:
    enabled: true
    poll_seconds: 300
    keep: 30
    feeds:
      - { name: BBC World, url: "https://feeds.bbci.co.uk/news/world/rss.xml" }
      - { name: NPR, url: "https://feeds.npr.org/1001/rss.xml" }
      - { name: Ars Technica, url: "https://feeds.arstechnica.com/arstechnica/index" }
      - { name: Hacker News, url: "https://hnrss.org/frontpage" }

  weather:
    enabled: true
    poll_seconds: 900
    location_name: "Clearwater, FL"
    latitude: 27.9659
    longitude: -82.8001

  weather_alerts:        # NWS active alerts at the weather module's location
    enabled: true
    overlay: true        # full-screen takeover for Extreme/Severe warnings
    poll_seconds: 180

  weather_radar:
    enabled: true
    poll_seconds: 300
    zoom: 7.5            # slippy-map zoom, fractional ok; 7 ≈ regional, 8 ≈ metro. Reuses the weather location.
    # Has a stage page — add `weather_radar` to rotation.order above to show it.

  hurricanes:
    enabled: true
    poll_seconds: 600    # NHC CurrentStorms (keyless); reuses the weather location.
    # Has a stage page — add `hurricanes` to rotation.order above to show it.

  launches:
    enabled: true
    poll_seconds: 1800      # Launch Library 2 free tier ≈ 15 req/hr — keep this coarse.
    poll_seconds_live: 360  # tighter poll inside the launch window (T-45m..T+15m)
    auto_feature: false     # pin the launch board around T-0 (like sports auto_feature)
    # Has a stage page — add `launches` to rotation.order above to show it.

  airquality:
    enabled: true
    poll_seconds: 1800   # keyless (Open-Meteo); reuses the weather location
    # Has a stage page — add `airquality` to rotation.order above to show it.

  fantasy:
    enabled: true
    league_id: ""         # ESPN league id (from the league URL); required to run
    team_id: null         # your team id (int); or set team_name for a fuzzy match
    team_name: ""
    season: null          # defaults to the current year
    poll_seconds_live: 30
    poll_seconds_idle: 1800
    auto_feature: true    # full-screen takeover + pin while my matchup is live
    celebrations: true    # celebration overlay when my starters score
    live_mode: true
    # Has a stage page — add `fantasy` to rotation.order above to show it.
    # Private leagues need ESPN_S2 + ESPN_SWID cookies in .env.

  # Stretch modules — flip enabled and add to rotation.order to use.
  # proxmox needs its env vars in .env (see .env.example). adsb defaults to a
  # free hosted API — no env needed unless provider: local.
  proxmox:
    enabled: false
    poll_seconds: 60

  adsb:
    enabled: false
    provider: airplaneslive   # airplaneslive | adsblol | adsbfi | local (local needs ADSB_URL)
    poll_seconds: 15
    radius_km: 40

  astro:
    enabled: false
    poll_seconds: 1800

appearance:
  theme: midnight     # midnight | daylight | amber | frost
  layout: rail-left   # rail-left | rail-right | full-stage | banner | focus | split | mosaic | zen

night:
  dim_at: "23:00"
  wake_at: "07:00"
  dim_level: 10
  day_level: 100
  method: ddc        # ddc → ddcutil; falls back to a software dim overlay
  nightly_reload_at: "04:00"

ha:
  scenes: []        # up to 4 scene entity_ids
  lights: []        # up to 8 light entity_ids
  fans: []          # up to 8 fan entity_ids (toggle + speed tiles)
  climate: null     # one climate entity_id
  media: null       # one media_player entity_id
  alerts: []        # [{entity, state, text?}] → alert-colored tape items while matched
