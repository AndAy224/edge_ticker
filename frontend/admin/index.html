<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>edge-ticker admin</title>
  </head>
  <body>
    <header>
      <h1>edge-ticker</h1>
      <span id="health-summary">—</span>
    </header>
    <main>
      <section id="controls">
        <h2>Display control</h2>
        <div class="button-row">
          <button data-action="prev">◀ Prev</button>
          <button data-action="next">Next ▶</button>
          <button data-action="pin">Pin</button>
          <button data-action="blank">Blank</button>
          <button data-action="wake">Wake</button>
          <button data-action="reload">Reload page</button>
        </div>
      </section>
      <section id="health">
        <h2>Health</h2>
        <table id="health-table"></table>
      </section>
      <section id="config">
        <h2>Config</h2>
        <p class="hint">
          Full document editor (the tabbed GUI lands in Phase 5). Saving applies
          to the display within seconds.
        </p>
        <textarea id="config-editor" spellcheck="false"></textarea>
        <div class="button-row">
          <button id="config-reload">Discard changes</button>
          <button id="config-save" class="primary">Save & apply</button>
          <span id="config-status"></span>
        </div>
      </section>
      <section id="entities">
        <h2>Home Assistant entities</h2>
        <p class="hint">Reference for the <code>ha</code> mapping section above.</p>
        <button id="entities-load">Load entities</button>
        <table id="entities-table"></table>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
